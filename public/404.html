<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VC Gurukul - Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages SPA Routing Support
      // https://github.com/rafgraph/spa-github-pages
      // Takes the current URL and converts it into a path query parameter structure
      // for index.html to process on load.
      
      // Change to 0 if deploying to a custom domain (e.g., vcgurukul.com)
      // Leave as 1 if deploying to a GitHub Pages repository subpath (e.g., username.github.io/vcgurukul-app)
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
